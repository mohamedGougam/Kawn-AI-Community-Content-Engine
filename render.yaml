# Render Blueprint — Kawn AI Community Content Engine
# Deploy: connect repo on Render → New Blueprint → select this file

databases:
  - name: kawn-content-db
    databaseName: kawn_content_engine
    user: kawn
    plan: free

services:
  - type: web
    name: kawn-content-backend
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: kawn-content-db
          property: connectionString
      - key: DATABASE_URL_SYNC
        fromDatabase:
          name: kawn-content-db
          property: connectionString
      - key: CORS_ORIGINS
        sync: false
      - key: SCHEDULER_ENABLED
        value: "true"
      - key: AI_DEFAULT_PROVIDER
        value: mock
      - key: SEED_SAMPLE_DATA
        value: "false"

  - type: web
    name: kawn-content-admin
    runtime: docker
    dockerfilePath: frontend/Dockerfile
    dockerContext: frontend
    plan: free
    envVars:
      - key: API_PROXY_URL
        fromService:
          name: kawn-content-backend
          type: web
          property: host
      - key: NEXT_PUBLIC_API_URL
        value: ""
